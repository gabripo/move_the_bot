<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spatial HMI - Robotic Arm Control</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div id="container">
    <div id="viewer"></div>
    <div id="sidebar">
      <h2>Input</h2>
      <div id="text-input-area">
        <input id="text-input" type="text" placeholder="Type a command... (e.g. 'move left')"/>
        <button id="text-send">Send</button>
      </div>
      <button id="btn-camera" class="btn">Start Camera</button>
      <button id="btn-mic" class="btn">Start Mic</button>
      <button id="btn-reset" class="btn btn-danger">Reset Environment</button>

      <h2>Status</h2>
      <div id="coords" class="stat"><span class="stat-label">Hand:</span> <span class="stat-value">--</span></div>
      <div id="voice" class="stat"><span class="stat-label">Voice:</span> <span class="stat-value">--</span></div>
      <div class="stat-sep">Joint Angles</div>
      <div id="angle-base" class="stat"><span class="stat-label">θ₁ base:</span> <span class="stat-value">--</span></div>
      <div id="angle-shoulder" class="stat"><span class="stat-label">θ₂ shoulder:</span> <span class="stat-value">--</span></div>
      <div id="angle-elbow" class="stat"><span class="stat-label">θ₃ elbow:</span> <span class="stat-value">--</span></div>
      <div class="stat-sep">End Effector</div>
      <div id="ee-threejs" class="stat"><span class="stat-label">Three.js:</span> <span class="stat-value">--</span></div>
      <div id="ee-ik" class="stat"><span class="stat-label">IK frame:</span> <span class="stat-value">--</span></div>
      <div id="grasp-status" class="stat"><span class="stat-label">Gripper:</span> <span class="stat-value">open</span></div>

      <h2>Object Log</h2>
      <div id="log"></div>
    </div>
  </div>

  <video id="camera-feed" autoplay playsinline muted style="display:none"></video>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js" crossorigin="anonymous"></script>
  <script src="js/coord.js?v=9"></script>
  <script src="js/rosbridge_client.js?v=9"></script>
  <script src="js/robot_viewer.js?v=9"></script>
  <script src="js/perception.js?v=9"></script>
  <script src="js/main.js?v=9"></script>
</body>
</html>
